<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing-card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="pro-badge">
        <h1>PRO</h1>
      </div>

      <div class="price">
        <span class="dollar">$</span>
        <span class="amount">49</span>
        <span class="month">/month</span>
      </div>

      <div class="features-list">
        <ul>
          <li>
            <span class="checkmark">✓</span>
            <span class="texts">Unlimited projects</span>
          </li>
          <li>
            <span class="checkmark">✓</span>
            <span class="texts">100 GB storage</span>
          </li>
          <li>
            <span class="checkmark">✓</span>
            <span class="texts">Priority support</span>
          </li>
          <li>
            <span class="checkmark">✓</span>
            <span class="texts">Custom domain</span>
          </li>
          <li>
            <span class="checkmark">✓</span>
            <span class="texts">Advanced analytics</span>
          </li>
        </ul>
      </div>

      <div>
        <button class="btn">Choose Plan</button>
      </div>

      <div>
        <footer class="footer">
          <p>14-day free trial. No credit card required.</p>
        </footer>
      </div>
    </div>
  </body>
</html>
